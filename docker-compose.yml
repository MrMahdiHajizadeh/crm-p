services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.docker
    volumes:
      - ./backend:/app
      - ./docker/backend/entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: /bin/bash /entrypoint.sh

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env.docker
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A crm worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env.docker
    environment:
      - CI=true
      - PUBLIC_DJANGO_API_URL=http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  frontend_node_modules:
